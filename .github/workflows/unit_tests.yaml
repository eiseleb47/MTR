name: Unit tests

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pytest pyyaml astropy

      - name: Run unit tests
        run: python -m pytest test_run_metis.py -v
