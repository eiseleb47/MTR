volumes:
  gui-venv:
  gui-uv-cache:

services:
  gui:
    build:
      context: ..
      dockerfile: container/Dockerfile
    userns_mode: keep-id
    volumes:
      # Full repo — source, cloned repos, and runtime data
      - type: bind
        source: ..
        target: /home/ubuntu/MTR
      # Wayland display socket for GUI rendering
      - type: bind
        source: ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}
        target: /run/user/1000/${WAYLAND_DISPLAY:-wayland-0}
      # EDPS configuration (application.properties)
      - type: bind
        source: ../logs
        target: /home/ubuntu/.edps
      # EDPS runtime data (database, intermediate files)
      - type: bind
        source: ../EDPS_data
        target: /home/ubuntu/EDPS_data
      # Persist venv and uv cache across container rebuilds
      - gui-venv:/home/ubuntu/MTR/.venv
      - gui-uv-cache:/home/ubuntu/.local/share/uv
    environment:
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=/run/user/1000
